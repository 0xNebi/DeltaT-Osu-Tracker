<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200" style="background-color: #0d0d12; border-radius: 12px; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    <linearGradient id="dtGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#bgGrad)" />

  <!-- Animated Delta Logo from Sidebar -->
  <g transform="translate(120, 50)">
    <!-- Outer triangle -->
    <polygon points="50,10 92.5,85 7.5,85" fill="url(#dtGrad)" opacity="0.1">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <!-- Inner hollow triangle -->
    <polygon points="50,25 80,77.5 20,77.5" fill="none" stroke="url(#dtGrad)" stroke-width="4.5" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,300;300,0;0,300" dur="8s" repeatCount="indefinite" />
    </polygon>
    <polygon points="50,25 80,77.5 20,77.5" fill="none" stroke="url(#dtGrad)" stroke-width="3" />
    <!-- Center dot -->
    <circle cx="50" cy="60" r="5" fill="#06b6d4" filter="url(#glow)">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title Text -->
  <g transform="translate(260, 105)">
    <text x="0" y="0" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="4">
      DELTAT
      <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="2" y="38" font-size="14" font-weight="600" fill="#a1a1aa" letter-spacing="3.5" text-transform="uppercase">
      osu! Match Tracker
    </text>
  </g>

  <!-- decorative lines -->
  <line x1="260" y1="12" x2="350" y2="12" stroke="url(#dtGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6">
     <animate attributeName="x2" values="260;350;260" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>